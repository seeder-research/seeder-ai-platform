# NOTE: "ai-platform-vip" below is a placeholder for the sanitized floating
# VIP address. Keepalived's virtual_ipaddress directive requires a literal
# IP/CIDR — it cannot resolve a hostname here at all (not even at runtime).
# Replace it with the real VIP/CIDR before deploying.

vrrp_script chk_traefik {
    script "docker inspect -f '{{.State.Running}}' traefik | grep -q true"
    interval 2
    weight -20
}

vrrp_instance AI_PLATFORM {
    state BACKUP
    interface bond0
    virtual_router_id 51
    priority 90
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass <keepalived-secret>
    }
    virtual_ipaddress {
        ai-platform-vip/20
    }
    track_script { chk_traefik }
}
